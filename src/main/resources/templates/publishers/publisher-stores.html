<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Stores for Publisher')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2>Stores Stocking Pub ID: <span th:text="${targetId}"></span></h2>
        <a th:href="@{/web/publishers/operations}" class="btn" style="margin-bottom: 15px;">&larr; Back to Menu</a>
        <table>
            <thead><tr><th>Store ID</th><th>Store Name</th><th>City</th><th>State</th></tr></thead>
            <tbody>
                <tr th:each="store : ${stores}">
                    <td th:text="${store.storId}"></td>
                    <td th:text="${store.storName}"></td>
                    <td th:text="${store.city}"></td>
                    <td th:text="${store.state}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
