<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">Book Partner Portal</title>
    <style>
        /* Base Page Styles */
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; color: #333; }
        .container { max-width: 1000px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: #2c3e50; }
        
        /* Navigation Bar Styles */
        .navbar { background-color: #2c3e50; padding: 15px 30px; display: flex; gap: 20px; flex-wrap: wrap; }
        .navbar a { color: white; text-decoration: none; font-size: 16px; font-weight: bold; }
        .navbar a:hover { color: #3498db; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; margin-bottom: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #34495e; color: white; }
        tr:hover { background-color: #f9f9f9; }
        
        /* Form & Input Styles */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="number"], input[type="datetime-local"], select { 
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; 
        }
        .error { color: #e74c3c; font-size: 14px; margin-top: 5px; display: block; font-weight: bold; }
        
        /* Button Styles */
        .btn { display: inline-block; padding: 10px 15px; color: white; background-color: #3498db; text-decoration: none; border-radius: 4px; border: none; cursor: pointer; font-size: 14px;}
        .btn:hover { background-color: #2980b9; }
        .btn-success { background-color: #2ecc71; }
        .btn-success:hover { background-color: #27ae60; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
    </style>
</head>

<body>
    <div th:fragment="navbar" class="navbar">
        <a th:href="@{/}">← Back to Team Hub</a>
        <a th:href="@{/web/authors/operations}">Authors</a>
        <a th:href="@{/web/titles/operations}">Titles</a>
        <a th:href="@{/web/publishers/operations}">Publishers</a>
        <a th:href="@{/web/employees/operations}">Employees</a>
        <a th:href="@{/web/stores/operations}">Stores</a>
        <a th:href="@{/web/jobs/operations}">Jobs</a>
        <a th:href="@{/web/discounts/operations}">Discounts</a>
        <a th:href="@{/web/titleauthors/operations}">TitleAuthors</a>
        <a th:href="@{/web/sales/operations}">Sales</a>
        <a th:href="@{/web/roysched/operations}">Royalty Schedules</a>
    </div>
</body>
</html>
