<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Employees</title>
</head>
<body>

    <h1>Employee Management</h1>
    <a th:href="@{/}">Back to Home Hub</a>
    <hr>

    <h3>Add New Employee</h3>
    <form th:action="@{/employees}" th:object="${employee}" method="post">
        
        <label>Employee ID (e.g. PMA42628M):</label>
        <input type="text" th:field="*{empId}" maxlength="10" />
        <span th:if="${#fields.hasErrors('empId')}" th:errors="*{empId}" style="color:red"></span>
        <br><br>

        <label>First Name:</label>
        <input type="text" th:field="*{fname}" maxlength="20" />
        <span th:if="${#fields.hasErrors('fname')}" th:errors="*{fname}" style="color:red"></span>
        <br><br>

        <label>Middle Initial:</label>
        <input type="text" th:field="*{minit}" maxlength="1" />
        <span th:if="${#fields.hasErrors('minit')}" th:errors="*{minit}" style="color:red"></span>
        <br><br>

        <label>Last Name:</label>
        <input type="text" th:field="*{lname}" maxlength="30" />
        <span th:if="${#fields.hasErrors('lname')}" th:errors="*{lname}" style="color:red"></span>
        <br><br>

        <label>Job Level:</label>
        <input type="number" th:field="*{jobLvl}" />
        <span th:if="${#fields.hasErrors('jobLvl')}" th:errors="*{jobLvl}" style="color:red"></span>
        <br><br>

        <label>Job Role:</label>
        <select th:field="*{job}">
            <option value="">-- Select a Job --</option>
            <option th:each="j : ${listJobs}" th:value="${j.jobId}" th:text="${j.jobDesc}"></option>
        </select>
        <span th:if="${#fields.hasErrors('job')}" th:errors="*{job}" style="color:red"></span>
        <br><br>

        <label>Publisher:</label>
        <select th:field="*{publisher}">
            <option value="">-- Select a Publisher --</option>
            <option th:each="p : ${listPublishers}" th:value="${p.pubId}" th:text="${p.pubName}"></option>
        </select>
        <span th:if="${#fields.hasErrors('publisher')}" th:errors="*{publisher}" style="color:red"></span>
        <br><br>

        <label>Hire Date:</label>
        <input type="datetime-local" th:field="*{hireDate}" />
        <br><br>

        <button type="submit">Save Employee</button>
    </form>

    <hr>

    <h3>Current Employees</h3>

    <form th:action="@{/employees/filter}" method="get" style="margin-bottom: 15px;">
        <label>Filter by Job Role:</label>
        <select name="jobId">
            <option value="">-- All Jobs --</option>
            <option th:each="j : ${listJobs}" th:value="${j.jobId}" th:text="${j.jobDesc}"></option>
        </select>
        <button type="submit">Filter</button>
        <a th:href="@{/employees}">Clear Filter</a>
    </form>

    <table border="1" cellpadding="5">
        <thead>
            <tr>
                <th>Emp ID</th>
                <th>Name</th>
                <th>Job Level</th>
                <th>Job Role</th>
                <th>Publisher</th>
                <th>Hire Date</th>
                <th>Action</th> </tr>
        </thead>
        <tbody>
            <tr th:each="emp : ${listEmployees}">
                <td th:text="${emp.empId}"></td>
                <td th:text="${emp.fname + ' ' + (emp.minit != null ? emp.minit + ' ' : '') + emp.lname}"></td>
                <td th:text="${emp.jobLvl}"></td>
                <td th:text="${emp.job != null ? emp.job.jobDesc : 'N/A'}"></td>
                <td th:text="${emp.publisher != null ? emp.publisher.pubName : 'N/A'}"></td>
                <td th:text="${emp.hireDate != null ? #temporals.format(emp.hireDate, 'yyyy-MM-dd') : 'N/A'}"></td>
                <td>
                    <a th:href="@{/employees/edit/{id}(id=${emp.empId})}">Edit</a>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
