<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Jobs API Harness')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    
    <div class="container">
        <h1 style="border-bottom: 2px solid #3498db; padding-bottom: 10px;">Jobs Entity: Operations Menu</h1>
        <p>Select a specific endpoint to test the service method.</p>
        
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
            <a th:href="@{/web/jobs/create}" class="btn btn-success">1. Create Job</a>
            <a th:href="@{/web/jobs/get-all}" class="btn">2. Get All Jobs</a>
            <a th:href="@{/web/jobs/get-by-id}" class="btn">3. Get Job By Id</a>
            <a th:href="@{/web/jobs/update}" class="btn" style="background-color: #f39c12;">4. Update Job</a>
            <a th:href="@{/web/jobs/patch}" class="btn" style="background-color: #e67e22;">5. Patch Job</a>
            <a th:href="@{/web/jobs/filter}" class="btn">6. Filer Jobs Between</a>
            <a th:href="@{/web/jobs/employees}" class="btn" style="background-color: #9b59b6;">7. Get Employees By Job Id</a>
            <a th:href="@{/web/jobs/publishers}" class="btn" style="background-color: #9b59b6;">8. Get Publishers By JobId</a>
            <a th:href="@{/web/jobs/assign}" class="btn" style="background-color: #34495e;">9. Assign Employee To Job</a>
        </div>
    </div>
</body>
</html>
