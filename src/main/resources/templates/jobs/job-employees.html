<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Employees for Job')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2>Employees Assigned to Job ID: <span th:text="${targetId}"></span></h2>
        <a th:href="@{/web/jobs/operations}" class="btn" style="margin-bottom: 15px;">&larr; Menu</a>
        <table>
            <thead><tr><th>Emp ID</th><th>First Name</th><th>Last Name</th><th>Job Level</th></tr></thead>
            <tbody><tr th:each="emp : ${employees}">
                <td th:text="${emp.empId}"></td><td th:text="${emp.fname}"></td><td th:text="${emp.lname}"></td><td th:text="${emp.jobLvl}"></td>
            </tr></tbody>
        </table>
    </div>
</body>
</html>
