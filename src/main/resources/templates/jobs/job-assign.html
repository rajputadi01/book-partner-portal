<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Assign Employee')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container" style="max-width: 600px;">
        <h2>Execute: assignEmployeeToJob (PATCH)</h2>
        
        <div th:if="${successMessage != null}" style="background: #d4edda; color: #155724; padding: 10px; margin-bottom: 15px;" th:text="${successMessage}"></div>
        <div th:if="${errorMessage != null}" style="background: #f8d7da; color: #721c24; padding: 10px; margin-bottom: 15px;" th:text="${errorMessage}"></div>

        <form th:action="@{/web/jobs/assign/save}" method="post">
            <div class="form-group"><label>Target Job ID:</label><input type="number" name="jobId" required></div>
            <div class="form-group"><label>Employee ID:</label><input type="text" name="empId" required></div>
            <div class="form-group"><label>New Job Level (Optional):</label><input type="number" name="jobLvl"></div>
            <button type="submit" class="btn btn-success">Execute Assignment</button>
            <a th:href="@{/web/jobs/operations}" class="btn btn-danger">Cancel</a>
        </form>
    </div>
</body>
</html>
