<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Job Form')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2 th:text="${formTitle}"></h2>
        <form th:action="${actionUrl}" th:object="${job}" method="post">
            <input type="hidden" th:field="*{jobId}" th:if="${isUpdate}">

            <div class="form-group">
                <label>Job Description:</label>
                <input type="text" th:field="*{jobDesc}">
                <span class="error" th:if="${#fields.hasErrors('jobDesc')}" th:errors="*{jobDesc}"></span>
            </div>

            <div class="form-group">
                <label>Minimum Level (>= 10):</label>
                <input type="number" th:field="*{minLvl}">
                <span class="error" th:if="${#fields.hasErrors('minLvl')}" th:errors="*{minLvl}"></span>
            </div>

            <div class="form-group">
                <label>Maximum Level (<= 250):</label>
                <input type="number" th:field="*{maxLvl}">
                <span class="error" th:if="${#fields.hasErrors('maxLvl')}" th:errors="*{maxLvl}"></span>
            </div>

            <button type="submit" class="btn btn-success">Submit Payload</button>
            <a th:href="@{/web/jobs/operations}" class="btn btn-danger">Cancel</a>
        </form>
    </div>
</body>
</html>
