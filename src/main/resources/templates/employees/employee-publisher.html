<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('1-Hop: Publisher Details')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2>Publisher details for Employee ID: <span th:text="${targetId}"></span></h2>
        <a th:href="@{/web/employees/operations}" class="btn" style="margin-bottom: 15px;">&larr; Back to Menu</a>
        <table>
            <thead><tr><th>Pub ID</th><th>Name</th><th>City</th><th>State</th></tr></thead>
            <tbody>
                <tr>
                    <td th:text="${publisher.pubId}"></td>
                    <td th:text="${publisher.pubName}"></td>
                    <td th:text="${publisher.city}"></td>
                    <td th:text="${publisher.state}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
