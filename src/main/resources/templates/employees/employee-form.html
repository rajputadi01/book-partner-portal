<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Employee Form')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2 th:text="${formTitle}"></h2>
        
        <div th:if="${errorMessage != null}" style="background: #f8d7da; color: #721c24; padding: 10px; margin-bottom: 15px;" th:text="${errorMessage}"></div>
        
        <form th:action="${actionUrl}" th:object="${employee}" method="post">
            <input type="hidden" name="isUpdate" th:value="${isUpdate}">
            
            <div class="form-group">
                <label>Employee ID (Regex enforced e.g., PMA42628M):</label>
                <input type="text" th:field="*{empId}" th:readonly="${isUpdate}" th:style="${isUpdate ? 'background-color: #eee;' : ''}">
                <span class="error" th:if="${#fields.hasErrors('empId')}" th:errors="*{empId}"></span>
            </div>
            
            <div class="form-group">
                <label>First Name:</label>
                <input type="text" th:field="*{fname}">
                <span class="error" th:if="${#fields.hasErrors('fname')}" th:errors="*{fname}"></span>
            </div>
            <div class="form-group">
                <label>Middle Initial (Optional):</label>
                <input type="text" th:field="*{minit}" maxlength="1">
            </div>
            <div class="form-group">
                <label>Last Name:</label>
                <input type="text" th:field="*{lname}">
                <span class="error" th:if="${#fields.hasErrors('lname')}" th:errors="*{lname}"></span>
            </div>

            <h3 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;">Assignments</h3>
            <div class="form-group">
                <label>Job Role ID:</label>
                <input type="number" th:field="*{job.jobId}">
            </div>
            <div class="form-group">
                <label>Job Level (Must fit within Job's Min/Max levels):</label>
                <input type="number" th:field="*{jobLvl}">
            </div>
            <div class="form-group">
                <label>Publisher ID (Default 9952):</label>
                <input type="text" th:field="*{publisher.pubId}">
            </div>
            <div class="form-group">
                <label>Hire Date (Leave blank for NOW):</label>
                <input type="datetime-local" th:field="*{hireDate}">
            </div>

            <button type="submit" class="btn btn-success">Submit Payload</button>
            <a th:href="@{/web/employees/operations}" class="btn btn-danger">Cancel</a>
        </form>
    </div>
</body>
</html>
