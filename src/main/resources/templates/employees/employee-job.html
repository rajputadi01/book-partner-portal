<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('1-Hop: Job Details')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2>Job details for Employee ID: <span th:text="${targetId}"></span></h2>
        <a th:href="@{/web/employees/operations}" class="btn" style="margin-bottom: 15px;">&larr; Back to Menu</a>
        <table>
            <thead><tr><th>Job ID</th><th>Description</th><th>Min Lvl</th><th>Max Lvl</th></tr></thead>
            <tbody>
                <tr>
                    <td th:text="${job.jobId}"></td>
                    <td th:text="${job.jobDesc}"></td>
                    <td th:text="${job.minLvl}"></td>
                    <td th:text="${job.maxLvl}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
