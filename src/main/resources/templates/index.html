<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Partner Portal - Team Portfolio</title>
    
    <style>
		
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f9f9f9;
            margin: 0;
            padding: 50px;
        }
        
        .header {
            margin-bottom: 50px;
        }

        .header h1 {
            color: #333;
        }

        /* This creates the 5-in-a-row grid natively */
        .team-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap; /* Allows wrapping on small screens */
        }

        /* Styling for the individual member cards */
        .team-member {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            width: 150px;
            text-decoration: none; /* Removes the underline from the link */
            color: #333;
            transition: 0.3s;
        }

        .team-member:hover {
            box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
            transform: translateY(-5px);
        }

        .team-member img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
        }

        .team-member h3 {
            margin: 0;
            font-size: 18px;
        }
		
    </style>

</head>
<body>

    <div class="header">
        <h1>Book Partner Portal</h1>
        <p>Engineering Team Portfolio & API Dashboard</p>
        <hr style="width: 50%; border: 1px solid #ccc;">
    </div>

    <div class="team-container">
        
        <a th:href="@{/portfolio/shireen}" class="team-member">
            <img src="https://api.dicebear.com/7.x/initials/svg?seed=Shireen&backgroundColor=0d6efd" alt="Shireen">
            <h3>Shireen</h3>
        </a>

        <a th:href="@{/portfolio/sakshi}" class="team-member">
            <img src="https://api.dicebear.com/7.x/initials/svg?seed=Sakshi&backgroundColor=198754" alt="Sakshi">
            <h3>Sakshi</h3>
        </a>

		<a th:href="@{/portfolio/aditya}" class="team-member"> 
			<img th:src="@{/images/aditya.png}" alt="Aditya">
			<h3>Aditya</h3>
		</a>

        <a th:href="@{/portfolio/rajas}" class="team-member">
            <img src="https://api.dicebear.com/7.x/initials/svg?seed=Rajas&backgroundColor=ffc107" alt="Rajas">
            <h3>Rajas</h3>
        </a>

        <a th:href="@{/portfolio/prathamesh}" class="team-member">
            <img src="https://api.dicebear.com/7.x/initials/svg?seed=Prathamesh&backgroundColor=6f42c1" alt="Prathamesh">
            <h3>Prathamesh</h3>
        </a>

    </div>

</body>
</html>
