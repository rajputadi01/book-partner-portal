<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Title Form')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2 th:text="${formTitle}"></h2>
        
        <div th:if="${errorMessage != null}" style="background: #f8d7da; color: #721c24; padding: 10px; margin-bottom: 15px;" th:text="${errorMessage}"></div>
        
        <form th:action="${actionUrl}" th:object="${title}" method="post">
            <input type="hidden" name="isUpdate" th:value="${isUpdate}">
            
            <div class="form-group">
                <label>Title ID (Max 10 chars):</label>
                <input type="text" th:field="*{titleId}" th:readonly="${isUpdate}" th:style="${isUpdate ? 'background-color: #eee;' : ''}">
                <span class="error" th:if="${#fields.hasErrors('titleId')}" th:errors="*{titleId}"></span>
            </div>
            <div class="form-group">
                <label>Book Name:</label>
                <input type="text" th:field="*{titleName}">
                <span class="error" th:if="${#fields.hasErrors('titleName')}" th:errors="*{titleName}"></span>
            </div>
            <div class="form-group">
                <label>Genre/Type (Default: UNDECIDED):</label>
                <input type="text" th:field="*{type}">
            </div>
            
            <div class="form-group" style="padding: 10px; background: #e8f4f8; border-left: 4px solid #3498db;">
                <label>Publisher ID (Leave blank to remain Self-Published / Null):</label>
                <input type="text" th:field="*{publisher.pubId}">
            </div>
            
            <div class="form-group">
                <label>Price ($):</label>
                <input type="number" step="0.01" th:field="*{price}">
            </div>
            <div class="form-group">
                <label>Advance ($):</label>
                <input type="number" step="0.01" th:field="*{advance}">
            </div>
            <div class="form-group">
                <label>Standard Royalty (%):</label>
                <input type="number" th:field="*{royalty}">
            </div>
            <div class="form-group">
                <label>Year-to-Date Sales:</label>
                <input type="number" th:field="*{ytdSales}">
            </div>
            <div class="form-group">
                <label>Notes:</label>
                <input type="text" th:field="*{notes}">
            </div>
            <div class="form-group">
                <label>Publication Date (Leave blank for NOW):</label>
                <input type="datetime-local" th:field="*{pubdate}">
            </div>

            <button type="submit" class="btn btn-success">Submit Payload</button>
            <a th:href="@{/web/titles/operations}" class="btn btn-danger">Cancel</a>
        </form>
    </div>
</body>
</html>
