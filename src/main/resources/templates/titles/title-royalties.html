<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Royalty Schedules')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2>Royalty Brackets for Title ID: <span th:text="${targetId}"></span></h2>
        <a th:href="@{/web/titles/operations}" class="btn" style="margin-bottom: 15px;">&larr; Menu</a>
        <table>
            <thead><tr><th>Schedule ID</th><th>Low Volume</th><th>High Volume</th><th>Royalty (%)</th></tr></thead>
            <tbody>
                <tr th:each="royalty : ${royalties}">
                    <td th:text="${royalty.royschedId}"></td>
                    <td th:text="${royalty.lorange}"></td>
                    <td th:text="${royalty.hirange}"></td>
                    <td th:text="${royalty.royalty}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
