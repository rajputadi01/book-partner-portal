<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Sales Transactions') }"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2>Sales Ledger for Title ID: <span th:text="${targetId}"></span></h2>
        <a th:href="@{/web/titles/operations}" class="btn" style="margin-bottom: 15px;">&larr; Menu</a>
        <table>
            <thead><tr><th>Store ID</th><th>Order #</th><th>Date</th><th>Qty</th><th>Terms</th></tr></thead>
            <tbody>
                <tr th:each="sale : ${sales}">
                    <td th:text="${sale.store.storId}"></td>
                    <td th:text="${sale.ordNum}"></td>
                    <td th:text="${#temporals.format(sale.ordDate, 'yyyy-MM-dd')}"></td>
                    <td th:text="${sale.qty}"></td>
                    <td th:text="${sale.payterms}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
