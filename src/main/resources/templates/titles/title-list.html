<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Title Results')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2 th:text="${pageTitle}"></h2>
        <a th:href="@{/web/titles/operations}" class="btn" style="margin-bottom: 15px;">&larr; Back to Menu</a>
        <table>
            <thead><tr><th>ID</th><th>Book Name</th><th>Type</th><th>Pub ID</th><th>Price</th><th>Pub Date</th></tr></thead>
            <tbody>
                <tr th:each="title : ${titles}">
                    <td th:text="${title.titleId}"></td>
                    <td th:text="${title.titleName}"></td>
                    <td th:text="${title.type}"></td>
                    <td th:text="${title.publisher != null ? title.publisher.pubId : 'SELF-PUB'}"></td>
                    <td th:text="${title.price}"></td>
                    <td th:text="${#temporals.format(title.pubdate, 'yyyy-MM-dd')}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
