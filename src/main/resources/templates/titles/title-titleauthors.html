<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Contracts & Splits')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    <div class="container">
        <h2>Contracts & Splits for Title ID: <span th:text="${targetId}"></span></h2>
        <a th:href="@{/web/titles/operations}" class="btn" style="margin-bottom: 15px;">&larr; Menu</a>
        <table>
            <thead><tr><th>Author ID</th><th>Order Status</th><th>Royalty Split (%)</th></tr></thead>
            <tbody>
                <tr th:each="ta : ${titleAuthors}">
                    <td th:text="${ta.author.auId}"></td>
                    <td th:text="${ta.auOrd}"></td>
                    <td th:text="${ta.royaltyPer}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
