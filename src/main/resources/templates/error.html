<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments :: head('Error Detected')}"></head>
<body>
    <div th:replace="~{fragments :: navbar}"></div>
    
    <div class="container" style="max-width: 600px; text-align: center; margin-top: 50px;">
        
        <div style="font-size: 80px; font-weight: bold; color: #e74c3c; margin-bottom: 10px;">
            <span th:text="${status != null ? status : '500'}"></span>
        </div>
        
        <h1 style="color: #2c3e50; border-bottom: none; margin-bottom: 5px;" 
            th:text="${error != null ? error : 'Unexpected Application Error'}"></h1>
            
        <p style="font-size: 18px; color: #7f8c8d; margin-bottom: 30px; padding: 20px; background-color: #fcf3f2; border-radius: 8px; border-left: 4px solid #e74c3c;" 
           th:text="${message != null ? message : 'Something went wrong processing your request.'}"></p>

        <p style="font-size: 14px; color: #bdc3c7; margin-bottom: 30px;">
            Failed Path: <span th:text="${path}">/unknown</span> <br>
            Time: <span th:text="${timestamp != null ? #temporals.format(timestamp, 'yyyy-MM-dd HH:mm:ss') : 'Unknown'}"></span>
        </p>

        <a href="javascript:history.back()" class="btn btn-danger" style="margin-right: 10px;">&larr; Go Back</a>
        <a th:href="@{/}" class="btn btn-success">Return to Team Hub</a>
        
    </div>
</body>
</html>
