# SERVER CONFIGURATION
server.port=8080
spring.application.name=book-partner-portal
server.address=0.0.0.0

# DATABASE CONFIGURATION (Localhost with Protected Secrets)
spring.datasource.url=jdbc:mysql://localhost:3306/pubs?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & HIBERNATE CONFIGURATION
# 'update' will create the new Auth tables (users, roles, user_roles) but leave your existing pubs tables alone!
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# THYMELEAF CACHE
spring.thymeleaf.cache=false